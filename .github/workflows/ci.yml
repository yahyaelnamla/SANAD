name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: sanad
          POSTGRES_PASSWORD: sanad
          POSTGRES_DB: sanad_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sanad -d sanad_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check backend/ config/ tests/ alembic/ rag/ agents/

      - name: Run unit and integration tests
        env:
          FANAR_API_KEY: test-key-for-ci
          JWT_SECRET: test-jwt-secret-for-ci
          TEST_DATABASE_URL: postgresql+asyncpg://sanad:sanad@localhost:5432/sanad_test
        run: pytest tests/ --cov=backend --cov=agents --cov=rag --cov-report=term-missing --cov-report=xml

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  frontend:
    runs-on: ubuntu-latest
    needs: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Run Vitest
        working-directory: frontend
        run: npm test

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t sanad-backend:test .
